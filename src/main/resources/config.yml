# ============================================================================
#  Better Pets Paper - configuration
#  Every option is documented. Missing options are repaired automatically on
#  start (your existing values are kept).
# ============================================================================

# Cooldown (in ticks, 20 = 1 second) between opening the /pets menu.
open-cooldown-ticks: 20
# Maximum number of pets a single player can own.
max-pets-per-player: 45
# Base chance (percent) for a generated chest to contain a pet.
chest-pet-chance-percent: 2.5
# Global pet XP multiplier. Higher = pets level faster. Range 0.1 - 5.0.
pet-xp-multiplier: 1.0
# Pet XP Booster settings. max-minutes caps admin-created boosters and consumption.
xp-booster:
  max-minutes: 1440
  broadcast-drops: true
  broadcast-activations: true
# Pet flight tuning (used while riding a dragon, Phoenix, or Shadow Dragon pet at
# level 50+). You sit on the pet and steer it like a real mount: look where you
# want to go and hold forward, jump to climb, look down to dive, sneak to
# dismount. The mount is moved by velocity every tick, so it stays smooth and
# collides with blocks instead of clipping through them.
#   flight-speed:      horizontal/forward flight speed in blocks per tick.
#   flight-lift:       extra upward speed while holding jump.
#   flight-pet-offset: how far below the seat the pet body floats.
flight-speed: 0.6
flight-lift: 0.5
flight-pet-offset: -0.4
# How often (ticks) all pet data is auto-saved. Minimum 1200 (60s).
save-interval-ticks: 6000
# How often (ticks) the active pet follows/updates. Lower = smoother, more CPU.
follow-update-ticks: 3
# How often (ticks) periodic pet abilities are applied.
ability-update-ticks: 100
# Follow behaviour of the active pet relative to the player.
follow-distance: 2.4
follow-height: 1.2
follow-side-offset: 0.75
follow-turn-speed-degrees: 6.0
# If the pet is further than this (blocks) from the player it teleports to catch up.
follow-teleport-distance: 24.0
# Interpolation duration (ticks) used when the pet display teleports.
follow-teleport-duration-ticks: 8
# Log extra info to the console (pet spawns, booster drops, etc.).
debug-logging: true
# Log each chest/vault/trial-spawner loot roll attempt (very verbose).
debug-loot-rolls: false

# External modules (e.g. BetterModel) are experimental. While this is false the
# /pets modules command is blocked and no external module can be activated.
experimental-modules: false

# ---------------------------------------------------------------------------
#  Storage
# ---------------------------------------------------------------------------
storage:
  # Storage backend. "yaml" is the stable default. "sqlite" is planned/opt-in
  # and experimental; until it ships, selecting it keeps using the YAML store.
  type: yaml
  backup:
    # Master switch for automatic backups.
    enabled: true
    # Keep one dated copy of pets.yml per day in plugins/BetterPets/backups.
    daily: true
    # How many daily backups to keep before the oldest are pruned.
    keep-days: 14

# ---------------------------------------------------------------------------
#  3D model rendering (only used when the BetterModel module is enabled)
# ---------------------------------------------------------------------------
# Vertical offset applied when a grounded model is snapped to the ground.
model-ground-offset: 0.05
# Height (blocks) of the pet name hologram above the model.
model-nametag-height: 2.6
# Extra yaw (degrees) if a model was built facing a different direction.
model-facing-yaw-offset-degrees: 0.0
# Per-pet model name overrides (petNameOrId -> modelFileName without .bbmodel).
model-overrides: {}

# ---------------------------------------------------------------------------
#  Pet sources - where pets (and XP boosters) can be obtained.
#  Toggle and tune each one in /pets drop. Each has its own chance-percent.
# ---------------------------------------------------------------------------
pet-sources:
  # Chests keep using chest-pet-chance-percent above.
  chest:
    enabled: true
  # Chance to fish out a pet instead of the normal catch.
  fishing:
    enabled: true
    chance-percent: 1.0
  # Chance a spawning Wandering Trader carries a one-time pet deal.
  wandering-trader:
    enabled: true
    chance-percent: 25.0
  # Chance to brush a pet out of suspicious sand/gravel.
  brushing:
    enabled: true
    chance-percent: 1.5
  # Vaults and Trial Spawners (vanilla and data pack). ominous-bonus-percent is
  # added on top of chance-percent when the block is ominous (any level counts).
  vault:
    enabled: true
    chance-percent: 2.0
    ominous-bonus-percent: 3.0
  trial-spawner:
    enabled: true
    chance-percent: 1.5
    ominous-bonus-percent: 2.5
  # Chance a hostile mob drops a Pet XP Booster (x2-x5, 15/30/45/60 minutes).
  xp-booster:
    enabled: true
    chance-percent: 1.5

# ---------------------------------------------------------------------------
#  Discovery broadcasts - which rarities announce a find in chat.
# ---------------------------------------------------------------------------
discovery-broadcasts:
  common: true
  rare: true
  epic: true
  legendary: true
  mythical: true

# ---------------------------------------------------------------------------
#  Messages - all player-facing text. %pet%, %player%, %level%, %chance% are
#  replaced where applicable.
# ---------------------------------------------------------------------------
messages:
  only-players: "Only players can use /pets."
  no-permission: "You do not have permission to use /pets."
  cooldown: "Please wait a moment before opening the pet menu again."
  pet-added: "Added %pet% to your pet list."
  duplicate-pet: "You already have this pet."
  pet-limit: "You have reached the maximum amount of pets."
  active-pet: "You summoned %pet%."
  despawned: "Your active pet has been despawned."
  converted: "Converted %pet% back to an item."
  no-active-pet: "You do not have an active pet."
  no-space: "Your inventory is full, so the item was dropped."
  usage-give: "Usage: /pets give <pet|all> [level] [player]"
  usage-xpboost: "Usage: /pets xpboost give <x2-x5> <time> [player]"
  usage-set-name: "Usage: /pets set name <name> (your pet must be summoned)."
  unknown-pet: "Unknown pet: %pet%"
  player-not-found: "Player not found: %player%"
  test-give: "Gave %pet% level %level% to %player%."
  booster-give: "Gave Pet XP Booster %tier% for %time% to %player%."
  protected-anvil: "Better Pets items cannot be renamed in an anvil."
  chances-saved: "Spawn chance for %pet% is now %chance%%."
  info-opened: "Opening pet catalogue."
  alpaca-storage-not-empty: "Empty the Alpaca storage before switching, despawning, or converting this pet."
  no-pet-storage: "Pet items cannot be stored inside pet storage."
  modules-experimental: "External modules are experimental and disabled. Set experimental-modules: true in config.yml to use /pets modules."
