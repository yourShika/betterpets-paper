# ============================================================================
#  Better Pets - English language file (en)
#  Select the active language with "language:" in config.yml (en, de, pl).
#  On every update, NEW keys are merged into your existing language files
#  automatically; your edited lines are kept. Missing keys fall back to English.
#  Placeholders like %pet% %player% %level% %chance% %tier% %time% are replaced.
# ============================================================================
messages:
  only-players: "Only players can use /pets."
  no-permission: "You do not have permission to use /pets."
  cooldown: "Please wait a moment before opening the pet menu again."
  pet-added: "Added %pet% to your pet list."
  duplicate-pet: "You already have this pet."
  pet-limit: "You have reached the maximum amount of pets."
  active-pet: "You summoned %pet%."
  despawned: "Your active pet has been despawned."
  converted: "Converted %pet% back to an item."
  no-active-pet: "You do not have an active pet."
  no-space: "Your inventory is full, so the item was dropped."
  usage-give: "Usage: /pets give <pet|all> [level] [player]"
  usage-xpboost: "Usage: /pets xpboost give <x2-x5> <time> [player]"
  usage-set-name: "Usage: /pets set name <name> (your pet must be summoned)."
  unknown-pet: "Unknown pet: %pet%"
  player-not-found: "Player not found: %player%"
  test-give: "Gave %pet% level %level% to %player%."
  booster-give: "Gave Pet XP Booster %tier% for %time% to %player%."
  protected-anvil: "Better Pets items cannot be renamed in an anvil."
  chances-saved: "Spawn chance for %pet% is now %chance%%."
  info-opened: "Opening pet catalogue."
  alpaca-storage-not-empty: "Empty the Alpaca storage before switching, despawning, or converting this pet."
  no-pet-storage: "Pet items cannot be stored inside pet storage."
  modules-experimental: "External modules are experimental and disabled. Set experimental-modules: true in config.yml to use /pets modules."

# Renaming an active pet (/pets set name / restore name).
rename:
  length: "The pet name must be between 1 and 32 characters."
  success: "Renamed your pet to '%name%'."
  restored: "Restored the default name (%pet%)."

# Pet XP Booster feedback.
booster:
  already-active: "You already have a Pet XP Booster active (x%tier%, %time% left). Boosters do not stack."
  activated: "<light_purple>Pet XP Booster </light_purple><gradient:#E040FB:#B388FF><bold>x%tier%</bold></gradient><light_purple> activated for </light_purple><aqua>%time%</aqua><light_purple>! Speeds up pet leveling only; the timer runs only while you are online.</light_purple>"
  expired: "<gray>Your </gray><light_purple>Pet XP Booster</light_purple><gray> has expired.</gray>"
  received: "<light_purple>You received a Pet XP Booster </light_purple><gradient:#E040FB:#B388FF><bold>x%tier%</bold></gradient><light_purple> for </light_purple><aqua>%time%</aqua><light_purple>.</light_purple>"
  no-active: "No active Pet XP Booster."
  active-line: "Active booster: x%tier%"
  time-left: "Time left: %time%"
  only-leveling: "Only speeds up pet leveling; counts down while online."

# Level up and Phoenix revive.
pet:
  leveled: "<green>✦ Your </green><gradient:#FFE082:#FFA000><bold>%pet%</bold></gradient><green> reached level </green><gold><bold>%level%</bold></gold><green>!</green>"
  phoenix-saved: "<gradient:#FF8A00:#FFD54F><bold>✦ Your Phoenix saved you from death!</bold></gradient>"

# First-time hint shown when a player opens the menu.
hint:
  help: "Tip: type /pets help to see all commands."

# Pet tokens (/pets scrap) and the slot machine (/pets slots).
tokens:
  disabled: "<gray>The pet token / slots feature is disabled.</gray>"
  balance: "<gray>You have </gray><gold><bold>%total%</bold></gold><gray> pet token(s). Spend them in /pets slots.</gray>"
  scrapped: "<gray>Scrapped </gray><white>%pet%</white><gray> for </gray><gold>%tokens%</gold><gray> token(s) - balance </gray><gold>%total%</gold><gray>.</gray>"
  scrapped-none: "<red>Hold a Better Pets pet item to scrap it into tokens.</red>"
  scrapped-all: "<gray>Scrapped </gray><aqua>%count%</aqua><gray> pet item(s) for </gray><gold>%tokens%</gold><gray> token(s) - balance </gray><gold>%total%</gold><gray>.</gray>"
  usage: "Usage: /pets tokens [give|remove <player|all> <amount> | pass <player> <amount>]"
  invalid-amount: "Enter a positive whole number of tokens."
  player-not-found: "Player not found: %player%"
  given: "Gave %amount% token(s) to %player% (their balance: %total%)."
  removed: "Removed %amount% token(s) from %player% (their balance: %total%)."
  given-all: "Gave %amount% token(s) to every online player."
  removed-all: "Removed %amount% token(s) from every online player."
  received-admin: "You received %amount% pet token(s)."
  pass-sent: "Sent %amount% token(s) to %player%. Balance: %total%."
  pass-received: "%player% sent you %amount% pet token(s)."
  pass-self: "You cannot pass tokens to yourself."
  pass-not-enough: "You only have %total% token(s)."
slots:
  not-enough: "<red>You need </red><gold>%cost%</gold><red> tokens to spin - you have </red><gold>%total%</gold><red>.</red>"
  spinning: "<gray>Wait for the reels to stop.</gray>"
  won: "<green>The reels landed on </green><yellow>%reward% x%amount%</yellow><green>!</green>"
  won-pet: "<gradient:#FFE082:#FF8A00><bold>✦ JACKPOT! You pulled a %pet%!</bold></gradient>"
  jackpot-broadcast: "<aqua>%player%</aqua><gray> hit the slots jackpot and won </gray><gradient:#FFE082:#FF8A00><bold>%pet%</bold></gradient><gray>!</gray>"

# Per-player broadcast mute (/pets mute).
broadcast:
  muted: "<yellow>Pet find/booster broadcasts are now </yellow><red><bold>OFF</bold></red><yellow>. Use /pets mute again to turn them back on.</yellow>"
  unmuted: "<green>Pet find/booster broadcasts are now </green><dark_green><bold>ON</bold></dark_green><green> again.</green>"

# Convert-to-item confirmation (click twice).
convert:
  confirm: "<gold>Click Convert To Item again to turn </gold><gradient:#FFE082:#FFA000><bold>%pet%</bold></gradient><gold> into an item. Its level and progress are kept.</gold>"
  cancelled: "Conversion cancelled."

# Numeric chat input for spawn chance / XP multiplier.
input:
  prompt-chance: "Type the new spawn chance for %pet% in percent (0.001 - 100), or 'cancel'."
  prompt-xp: "Type the new pet XP multiplier (0.1 - 5.0), or 'cancel'."
  cancelled: "Input cancelled."
  invalid: "That is not a valid number. Try again or type 'cancel'."
  applied: "Value updated to %value%."

# Optional external modules GUI.
module:
  needs-plugin: "Requires %plugin% - not installed or disabled."
  click-enable: "Click to enable."
  click-disable: "Click to disable."
  waiting-plugin: "Enabled in modules.yml, waiting for the required plugin."
  icon: "Icon: %material%"
